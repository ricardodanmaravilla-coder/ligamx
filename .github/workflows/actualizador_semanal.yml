name: Actualizar BD Liga MX

on:
  schedule:
    # Se ejecuta todos los miércoles a las 09:00 UTC (3:00 AM hora de México)
    - cron: '0 9 * * 3'
  workflow_dispatch: # Este comando te pondrá un botón en GitHub para correrlo manualmente cuando quieras

permissions:
  contents: write # Permiso vital para que el bot pueda guardar el nuevo CSV

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy

      - name: Ejecutar Script de Actualización
        env:
          # Aquí GitHub saca la llave de la bóveda y se la pasa a tu código
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        # NOTA: Cambia 'tu_script.py' por el nombre real de tu archivo de descarga
        run: python modules/actualizar_bd.py

      - name: Guardar el nuevo CSV en el repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historico_ligamx_completo.csv
          # El "|| echo" evita que el bot marque error si un día no hubo partidos nuevos que guardar
          git commit -m "🤖 Actualización automática de la jornada (Miércoles)" || echo "No hay cambios para hacer commit"
          git push
