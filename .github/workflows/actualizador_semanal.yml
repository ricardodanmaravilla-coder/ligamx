name: Actualizar BD Liga MX

on:
  schedule:
    - cron: '0 9 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4 # <-- Actualizado a v4 para quitar el warning de Node

      - name: Configurar Python
        uses: actions/setup-python@v5 # <-- Actualizado a v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy

      - name: Ejecutar Script de Actualización
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        # 👇 IMPORTANTE: Cambia "mi_archivo.py" por la ruta exacta en tu repositorio
        # Ejemplo: Si está dentro de una carpeta, usa "python modules/actualizar.py"
        run: python actualizar_bd.py 

      - name: Guardar el nuevo CSV en el repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historico_ligamx_completo.csv
          git commit -m "🤖 Actualización automática de la jornada (Miércoles)" || echo "No hay cambios para hacer commit"
          git push
